name: AI audit plugin publish issue

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  ai-audit-publish-issue:
    if: ${{ github.event.issue.pull_request == null }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Run AI audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_AUDIT_API_URL: ${{ vars.AI_AUDIT_API_URL }}
          AI_AUDIT_API_KEY: ${{ secrets.AI_AUDIT_API_KEY }}
          AI_AUDIT_MODEL: ${{ vars.AI_AUDIT_MODEL }}
        run: node scripts/publish-plugin-ai-audit.js
